<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名古屋の魅力</title>
    <link rel="stylesheet" href="attraction.css">
</head>
<body>

<main>

    <h1>名古屋の魅力</h1>

    <p class="intro">
        名古屋には歴史・文化・グルメなど、多くの魅力があります。
        今回はその中から3つをご紹介します。
    </p>

    <section class="feature">

        <div class="photo">
            <h2>名古屋城</h2>
            <img src="na_images/nagoya-castle2.jpg" alt="名古屋城">
        </div>

        <div class="text">
            <p>
                名古屋城は徳川家康によって築かれた名古屋を代表する名所です。
                金のしゃちほこや本丸御殿など、多くの見どころがあります。
            </p>
        </div>

    </section>

    <section class="feature">

        <div class="photo">
            <h2>ひつまぶし</h2>
            <img src="na_images/hitsumabushi.jpg" alt="ひつまぶし">
        </div>

        <div class="text">
            <p>
                名古屋めしの代表格であるひつまぶし。
                そのまま・薬味・だし茶漬けと、三通りの味わい方を楽しめます。
            </p>
        </div>

    </section>
    
    <section class="feature">

        <div class="photo">
            <h2>大須商店街</h2>
            <img src="na_images/ooshu-syoutengai.jpg" alt="大須商店街">
        </div>

        <div class="text">
            <p>
                約1200店舗が並ぶ名古屋を代表する商店街です。
                食べ歩きやショッピングを楽しめる人気スポットです。
            </p>
        </div>

    </section>

</main>

</body>
</html>
