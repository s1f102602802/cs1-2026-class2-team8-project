<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="news.css">
</head>
<body>
    <main>

    <h1>おすすめ観光地</h1>

    <p class="intro">
        名古屋には歴史ある神社や家族で楽しめる施設など、
        多くの観光スポットがあります。
        その中でもおすすめの3か所をご紹介します。
    </p>

    <!-- 熱田神宮 -->
    <section class="feature">

        <div class="photo">
            <h2>熱田神宮</h2>
            <img src="na_images/atsuta-zingu.jpg" alt="熱田神宮">
        </div>

        <div class="text">
            <p>
                約1900年の歴史を持つ神社で、
                三種の神器「草薙剣」を祀る由緒ある神社です。
                初詣や観光地としても人気があります。
            </p>
        </div>

    </section>

    <!-- 東山動植物園 -->
    <section class="feature">

        <div class="photo">
            <h2>東山動植物園</h2>
            <img src="na_images/higashiyama.jpg" alt="東山動植物園">
        </div>

        <div class="text">
            <p>
                動物園・植物園・東山スカイタワーがある人気スポットです。
                コアラやキリンなど多くの動物を見ることができます。
            </p>
        </div>

    </section>

    <!-- 名古屋港水族館 -->
    <section class="feature">

        <div class="photo">
            <h2>名古屋港水族館</h2>
            <img src="na_images/suizokukan.jpg" alt="名古屋港水族館">
        </div>

        <div class="text">
            <p>
                シャチやイルカショーで有名な水族館です。
                家族連れやカップルにも人気があり、
                一日中楽しめる観光スポットです。
            </p>
        </div>

    </section>

</main>
</body>
</html>
