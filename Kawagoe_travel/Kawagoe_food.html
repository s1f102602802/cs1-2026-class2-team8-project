    <h1>食べる/飲む</h1>
    <h2>COEDO HACHI</h2>
    <p>焼き芋ブリュレが名物の店舗。<br>筆者は焼き芋チーズブリュレを注文したが、焼き芋の甘さとチーズの塩味のバランスが絶品だった。</p>
    <h2>菓子屋横丁</h2>
    <p>二十ほど駄菓子屋などが集合した区画。長い麩菓子などが名物で、お土産や食べ歩きに最適。</p>
    <h2>ちいかわもぐもぐ本舗　川越店</h2>
    <p>全国にオープン予定含めて3店舗しかない、ちいかわと食をテーマにしたショップ。</p>
